<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="p:domain_verify" content="f209914fe96841b8f365ef7a35d4001d"/>
    <title>Admin - Review Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-page {
            min-height: 100vh;
            padding: 120px 0 80px;
            background: linear-gradient(135deg, var(--color-yellow-light) 0%, var(--color-pink-light) 50%, var(--color-green-light) 100%);
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .admin-header h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .tab-btn {
            padding: 15px 30px;
            border: none;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-soft);
        }
        
        .tab-btn.active {
            background: var(--color-pink);
            color: white;
        }
        
        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .review-admin-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-soft);
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .review-author-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .review-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--color-pink), var(--color-yellow));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        
        .review-meta h3 {
            margin: 0;
            font-size: 1.1rem;
        }
        
        .review-meta span {
            color: var(--color-gray);
            font-size: 0.9rem;
        }
        
        .review-stars {
            color: var(--color-yellow-dark);
        }
        
        .review-text {
            margin: 15px 0;
            line-height: 1.6;
        }
        
        .review-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-approve {
            background: var(--color-green);
            color: var(--color-black);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-reject {
            background: var(--color-pink);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-delete {
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .badge-pending {
            background: var(--color-yellow);
            color: var(--color-black);
        }
        
        .badge-approved {
            background: var(--color-green);
            color: var(--color-black);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--color-gray);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--color-pink);
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Logo" style="height: 50px;">
            </a>
            <div class="nav-actions">
                <a href="index.html" class="btn btn-primary" style="padding: 10px 25px; font-size: 0.9rem;">Back to Site</a>
            </div>
        </div>
    </nav>

    <!-- Login overlay -->
    <div id="loginOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#FFF9E6 0%,#FFF5F7 50%,#F0F7F0 100%);z-index:9999;display:flex;align-items:center;justify-content:center;">
        <div style="background:white;border-radius:20px;padding:40px;box-shadow:0 10px 40px rgba(0,0,0,0.1);max-width:400px;width:90%;text-align:center;">
            <h2 style="margin-bottom:20px;">Admin Login</h2>
            <p style="color:#888;margin-bottom:25px;">Enter the admin password to continue</p>
            <input type="password" id="adminPassword" placeholder="Admin password" style="width:100%;padding:12px 20px;border:2px solid #eee;border-radius:30px;font-size:1rem;margin-bottom:15px;box-sizing:border-box;" onkeydown="if(event.key==='Enter')adminLogin()">
            <p id="loginError" style="color:#ff4444;display:none;margin-bottom:15px;">Invalid password</p>
            <button onclick="adminLogin()" style="background:linear-gradient(135deg,#FFD93D,#FFB6C1);color:#333;border:none;padding:12px 30px;border-radius:30px;cursor:pointer;font-weight:600;font-size:1rem;width:100%;">Login</button>
        </div>
    </div>

    <section class="admin-page">
        <div class="container">
            <div class="admin-header">
                <h1>Review Management</h1>
                <p>Approve or reject customer reviews</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('pending')">
                    <i class="fas fa-clock"></i> Pending (<span id="pendingCount">0</span>)
                </button>
                <button class="tab-btn" onclick="showTab('approved')">
                    <i class="fas fa-check"></i> Approved (<span id="approvedCount">0</span>)
                </button>
                <button class="tab-btn" onclick="showTab('all')">
                    <i class="fas fa-list"></i> All Reviews
                </button>
            </div>

            <div id="pending" class="tab-content active">
                <div id="pendingReviews"></div>
            </div>

            <div id="approved" class="tab-content">
                <div id="approvedReviews"></div>
            </div>

            <div id="all" class="tab-content">
                <div id="allReviews"></div>
            </div>
        </div>
    </section>

    <script>
        let allReviews = [];
        let adminToken = '';

        // Escape HTML to prevent XSS
        function escapeHTML(str) {
            if (typeof str !== 'string') return str;
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (!password) return;

            // Store the token (password is used as Bearer token)
            adminToken = password;
            sessionStorage.setItem('adminToken', adminToken);

            // Test the token by calling an admin endpoint
            fetch('/api/reviews/all', {
                headers: { 'Authorization': 'Bearer ' + adminToken }
            }).then(res => {
                if (res.status === 401) {
                    document.getElementById('loginError').style.display = 'block';
                    sessionStorage.removeItem('adminToken');
                    adminToken = '';
                } else {
                    document.getElementById('loginOverlay').style.display = 'none';
                    loadReviews();
                }
            }).catch(() => {
                document.getElementById('loginError').style.display = 'block';
            });
        }

        // Check for existing session
        (function checkSession() {
            const saved = sessionStorage.getItem('adminToken');
            if (saved) {
                adminToken = saved;
                fetch('/api/reviews/all', {
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                }).then(res => {
                    if (res.ok) {
                        document.getElementById('loginOverlay').style.display = 'none';
                        loadReviews();
                    }
                });
            }
        })();

        async function loadReviews() {
            try {
                const response = await fetch('/api/reviews/all', {
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                if (response.status === 401) {
                    document.getElementById('loginOverlay').style.display = 'flex';
                    return;
                }
                const data = await response.json();
                allReviews = data.reviews || [];
                displayReviews();
                updateCounts();
            } catch (error) {
                console.error('Error loading reviews:', error);
                document.getElementById('pendingReviews').innerHTML =
                    '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Error loading reviews. Make sure server is running.</p></div>';
            }
        }

        function displayReviews() {
            const pending = allReviews.filter(r => !r.approved);
            const approved = allReviews.filter(r => r.approved);

            document.getElementById('pendingReviews').innerHTML = pending.length 
                ? pending.map(review => createReviewCard(review, true)).join('')
                : '<div class="empty-state"><i class="fas fa-inbox"></i><p>No pending reviews</p></div>';

            document.getElementById('approvedReviews').innerHTML = approved.length
                ? approved.map(review => createReviewCard(review, false)).join('')
                : '<div class="empty-state"><i class="fas fa-check-circle"></i><p>No approved reviews</p></div>';

            document.getElementById('allReviews').innerHTML = allReviews.length
                ? allReviews.map(review => createReviewCard(review, !review.approved)).join('')
                : '<div class="empty-state"><i class="fas fa-folder-open"></i><p>No reviews yet</p></div>';
        }

        function createReviewCard(review, showApprove) {
            return `
                <div class="review-admin-card">
                    <div class="review-header">
                        <div class="review-author-info">
                            <div class="review-avatar">${escapeHTML(review.avatar)}</div>
                            <div class="review-meta">
                                <h3>${escapeHTML(review.name)}</h3>
                                <span>${escapeHTML(review.date)}</span>
                            </div>
                        </div>
                        <div>
                            <span class="badge ${review.approved ? 'badge-approved' : 'badge-pending'}">
                                ${review.approved ? 'Approved' : 'Pending'}
                            </span>
                        </div>
                    </div>
                    <div class="review-stars">
                        ${Array(5).fill(0).map((_, i) => 
                            `<i class="fas fa-star" style="color: ${i < review.rating ? '#FFD93D' : '#ddd'}"></i>`
                        ).join('')}
                    </div>
                    <p class="review-text">${escapeHTML(review.text)}</p>
                    <div class="review-actions">
                        ${showApprove 
                            ? `<button class="btn-approve" onclick="approveReview(${review.id})"><i class="fas fa-check"></i> Approve</button>`
                            : `<button class="btn-reject" onclick="rejectReview(${review.id})"><i class="fas fa-times"></i> Unapprove</button>`
                        }
                        <button class="btn-delete" onclick="deleteReview(${review.id})"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `;
        }

        function updateCounts() {
            const pending = allReviews.filter(r => !r.approved).length;
            const approved = allReviews.filter(r => r.approved).length;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('approvedCount').textContent = approved;
        }

        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        async function approveReview(id) {
            try {
                const response = await fetch(`/api/reviews/${id}/approve`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                if (response.status === 401) { document.getElementById('loginOverlay').style.display = 'flex'; return; }
                if (response.ok) {
                    await loadReviews();
                    alert('Review approved!');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error approving review');
            }
        }

        async function rejectReview(id) {
            try {
                const response = await fetch(`/api/reviews/${id}/reject`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                if (response.status === 401) { document.getElementById('loginOverlay').style.display = 'flex'; return; }
                if (response.ok) {
                    await loadReviews();
                    alert('Review unapproved!');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error unapproving review');
            }
        }

        async function deleteReview(id) {
            if (!confirm('Are you sure you want to delete this review?')) return;

            try {
                const response = await fetch(`/api/reviews/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + adminToken }
                });
                if (response.status === 401) { document.getElementById('loginOverlay').style.display = 'flex'; return; }
                if (response.ok) {
                    await loadReviews();
                    alert('Review deleted!');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error deleting review');
            }
        }

        loadReviews();
    </script>
<script src="js/cookie-consent.js"></script>
</body>
</html>
