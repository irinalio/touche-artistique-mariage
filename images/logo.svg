<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="100%" style="stop-color:#FFB6C1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E91E63"/>
      <stop offset="100%" style="stop-color:#9C27B0"/>
    </linearGradient>
  </defs>
  
  <!-- Background shape -->
  <rect x="10" y="10" width="100" height="100" rx="20" fill="url(#bgGrad)"/>
  
  <!-- Figurine silhouette - bride -->
  <g transform="translate(30, 25)">
    <!-- Bride dress -->
    <path d="M25 45 Q25 35 20 30 Q15 25 25 20 Q35 25 30 30 Q25 35 25 45 Z" fill="#fff"/>
    <path d="M25 45 L15 75 Q25 80 35 75 L25 45" fill="#fff"/>
    <!-- Bride head -->
    <circle cx="25" cy="15" r="8" fill="#FFE4C4"/>
    <!-- Bride veil -->
    <path d="M17 15 Q10 20 12 35 L25 25 L38 35 Q40 20 33 15" fill="#fff" opacity="0.8"/>
    
    <!-- Groom -->
    <g transform="translate(25, 0)">
      <!-- Groom suit -->
      <path d="M25 45 L15 75 Q25 78 35 75 L25 45" fill="#2D2D2D"/>
      <path d="M25 45 L25 55" stroke="#fff" stroke-width="2"/>
      <!-- Groom head -->
      <circle cx="25" cy="15" r="8" fill="#FFE4C4"/>
      <!-- Groom hair -->
      <path d="M17 13 Q17 8 25 8 Q33 8 33 13" fill="#4A3728"/>
    </g>
  </g>
  
  <!-- Small heart -->
  <text x="85" y="95" font-size="16">💕</text>
  
  <!-- Text: Touche -->
  <text x="125" y="45" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#2D2D2D">Touche</text>
  
  <!-- Text: Artistique -->
  <text x="125" y="72" font-family="Georgia, serif" font-size="16" font-style="italic" fill="#666">Artistique</text>
  
  <!-- Text: Mariage -->
  <text x="125" y="100" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="url(#textGrad)">Mariage</text>
  
  <!-- Decorative line -->
  <line x1="125" y1="52" x2="230" y2="52" stroke="#FFE566" stroke-width="2"/>
</svg>
